name: CI

# master로의 push와 PR마다 정적 분석 + 테스트를 자동 실행한다.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.0
          channel: stable
          cache: true

      - name: 의존성 설치
        run: flutter pub get

      - name: 정적 분석
        run: flutter analyze

      - name: 테스트
        run: flutter test
